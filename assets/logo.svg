<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- App Icon 圆角裁剪 -->
    <clipPath id="app-clip">
      <rect x="0" y="0" width="512" height="512" rx="115" />
    </clipPath>

    <!-- 左上角：LGD 红色渐变 -->
    <linearGradient id="lgd-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <!-- 右下角：LGC 绿色渐变 -->
    <linearGradient id="lgc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Emoji 风格金锁渐变 -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- 银色拉杆渐变 -->
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <!-- 绿色多边形的立体覆盖投影 -->
    <filter id="overlap-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-8" dy="-8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- 居中金锁的投影 (适当收缩，避免污染LGC) -->
    <filter id="center-lock-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ================= 图标主容器 ================= -->
  <g clip-path="url(#app-clip)">
    
    <!-- 1. 左上角底层 (红色的 LGD 区域) -->
    <rect width="512" height="512" fill="url(#lgd-grad)"/>

    <!-- 2. 右下角覆盖层 (绿色的 LGC 区域) -->
    <polygon points="512,512 512,0 0,512" fill="url(#lgc-grad)" filter="url(#overlap-shadow)"/>

    <!-- 3. 对角线切割光效 (玻璃边缘质感) -->
    <line x1="512" y1="0" x2="0" y2="512" stroke="#ffffff" stroke-opacity="0.15" stroke-width="12"/>
    <line x1="512" y1="0" x2="0" y2="512" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3"/>

    <!-- ================= 左上角 LGD 文本 ================= -->
    <!-- 调整了坐标(更靠左上)和字号，确保不碰触锁体 -->
    <text x="125" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#ffffff" letter-spacing="-2" text-anchor="middle" dominant-baseline="central" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.3))">LGD</text>

    <!-- ================= 右下角 LGC 文本 ================= -->
    <!-- 调整了坐标(更靠右下)和字号，确保不碰触锁体 -->
    <text x="387" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#000000" letter-spacing="-2" text-anchor="middle" dominant-baseline="central" filter="drop-shadow(0 4px 8px rgba(255,255,255,0.25))">LGC</text>

    <!-- ================= 正中心：缩小版的 Emoji 开锁图标 ================= -->
    <g filter="url(#center-lock-shadow)">
      
      <!-- 银色锁梁 (按比例缩小，变短，右侧断开悬空) -->
      <path d="M 226 260 V 212 A 30 30 0 0 1 286 212 V 222" fill="none" stroke="url(#silver-grad)" stroke-width="20" stroke-linecap="round"/>
      
      <!-- 金色锁体 (缩小为 120x84 的可爱比例，置于正中) -->
      <rect x="196" y="246" width="120" height="84" rx="16" fill="url(#gold-grad)"/>
      
      <!-- 锁体内发光反光边 -->
      <rect x="196" y="246" width="120" height="84" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3"/>
      
      <!-- 锁眼 -->
      <g fill="#451a03">
        <circle cx="256" cy="278" r="11"/>
        <path d="M 248 284 L 240 308 H 272 L 264 284 Z"/>
      </g>
    </g>

    <!-- ================= App Icon 全局高光与边框 ================= -->
    <!-- 顶部微弱玻璃反光 -->
    <path d="M 0 0 L 512 0 L 512 160 C 256 120 0 160 0 160 Z" fill="#ffffff" opacity="0.06" />
    
    <!-- 内发光描边 -->
    <rect x="2" y="2" width="508" height="508" rx="113" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4"/>
    <rect x="2" y="2" width="508" height="508" rx="113" fill="none" stroke="#000000" stroke-opacity="0.15" stroke-width="2" transform="translate(0, 2)"/>

  </g>
</svg>